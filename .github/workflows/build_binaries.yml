name: Build and Commit Binaries

on:
  push:
    branches: [ master ]
    paths-ignore: # Prevents the workflow from running on binaries changes.
      - 'bin/**'

concurrency:
  group: building
  cancel-in-progress: true

jobs:

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

      # Initializes an SSH agent and loads the Deploy Key.
      # All subsequent git operations (fetch/push) are authenticated via SSH.
      #
      # This step uses Deploy Key to bypass the master branch protection rule,
      # which allows to push changes to the master branch only via pull request.
      #
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.WORKFLOW_DEPLOY_KEY }}

      # Checkout the repository via SSH Deploy Key.
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.WORKFLOW_DEPLOY_KEY }}
          persist-credentials: false

      - name: Set Up Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.1'

      - name: Build embed_code.go for Windows
        run: GOOS=windows GOARCH=amd64 go build -trimpath -o bin/embed-code-windows.exe main.go

      - name: Build embed_code.go for Ubuntu
        run: GOOS=linux GOARCH=amd64 go build -trimpath -o bin/embed-code-linux main.go

      - name: Build embed_code.go for MacOS
        run: GOOS=darwin GOARCH=amd64 go build -trimpath -o bin/embed-code-macos main.go

      - name: Commit Built Files
        uses: EndBug/add-and-commit@v9
        with:
          add: './bin'
          message: 'Update binaries.'
          default_author: github_actions
          push: true
